version: '3.9'

services:

  # ── Application Laravel ───────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: alchiclick_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - alchiclick_network
    depends_on:
      - db

  # ── Nginx ─────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: alchiclick_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - alchiclick_network
    depends_on:
      - app

  # ── MySQL ─────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: alchiclick_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE:      alchiclick
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER:          alchiclick
      MYSQL_PASSWORD:      secret
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - alchiclick_network

networks:
  alchiclick_network:
    driver: bridge

volumes:
  dbdata:
